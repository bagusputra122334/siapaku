<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kontak | Portfolio Bagus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh;
            background: linear-gradient(180deg, #B22222 0%, #8B0000 100%);
            padding: 20px; color: white;
        }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .logo img { width: 40px; }
        .logo h2 { font-size: 1.2rem; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: rgba(255,255,255,0.8); text-decoration: none;
            border-radius: 10px; margin-bottom: 8px; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
        .nav-item i { width: 20px; }
        .main-content { margin-left: 250px; padding: 30px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { color: #222; font-size: 1.8rem; }
        .back-btn, .logout-btn {
            background: #B22222; color: white; padding: 10px 20px;
            border-radius: 10px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
        }
        .back-btn:hover, .logout-btn:hover { background: #8B0000; }
        .contact-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .contact-item {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center;
        }
        .contact-item i { font-size: 2.5rem; color: #B22222; margin-bottom: 15px; }
        .contact-item p { color: #222; font-weight: 500; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../img/br.png" alt="Logo">
            <h2>Blackrose Admin</h2>
        </div>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="proyek.html" class="nav-item">
            <i class="fas fa-folder-open"></i> Proyek
        </a>
        <a href="tentang.html" class="nav-item">
            <i class="fas fa-user"></i> Tentang Saya
        </a>
        <a href="skills.html" class="nav-item">
            <i class="fas fa-code"></i> Skills
        </a>
        <a href="kontak.html" class="nav-item active">
            <i class="fas fa-envelope"></i> Kontak
        </a>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Kelola Kontak</h1>
            <div style="display: flex; gap: 10px;">
                <a href="dashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Kembali
                </a>
                <a href="logout.html" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </div>
        </div>
        <div class="contact-grid">
            <div class="contact-item">
                <i class="fa-brands fa-linkedin"></i>
                <p>LinkedIn</p>
            </div>
            <div class="contact-item">
                <i class="fa-solid fa-envelope"></i>
                <p>bagusdwijunior@gmail.com</p>
            </div>
            <div class="contact-item">
                <i class="fa-brands fa-github"></i>
                <p>GitHub</p>
            </div>
            <div class="contact-item">
                <i class="fa-brands fa-whatsapp"></i>
                <p>+62 831-4904-5901</p>
            </div>
        </div>
    </div>
</body>
</html>
